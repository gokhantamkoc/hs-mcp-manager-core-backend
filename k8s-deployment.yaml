apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mcp-workspace-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hs-mcp-manager-core-backend-deployment
  labels:
    app: hs-mcp-manager-core-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hs-mcp-manager-core-backend
  template:
    metadata:
      labels:
        app: hs-mcp-manager-core-backend
    spec:
      containers:
        - name: hs-mcp-manager-core-backend
          image: hs-mcp-manager-core-backend:local
          imagePullPolicy: Never # Forces Kubernetes to use the local image we build inside Minikube
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: workspace-storage
              mountPath: /workspace
      volumes:
        - name: workspace-storage
          persistentVolumeClaim:
            claimName: mcp-workspace-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: hs-mcp-manager-core-backend-service
spec:
  type: NodePort
  selector:
    app: hs-mcp-manager-core-backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30080 # Accessible at http://<minikube-ip>:30080